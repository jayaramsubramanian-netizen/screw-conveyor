/* ═══════════════════════════════════════════════════════════════════════════  VALIDATION  ═══ */
const FIELD_LIMITS={
  angle_deg:{min:-20,max:45,hint:"CEMA max 45°; inclines >20° reduce capacity significantly"},
  surge_factor:{min:1.0,max:2.0,hint:"Typical: 1.1–1.5; use 1.5+ for heavy starts"},
  speed_rpm:{min:5,max:300,hint:"CEMA max peripheral speed: ~1 m/s for abrasives"},
  diameter_m:{min:0.05,max:1.2,hint:"Standard range: 0.10–0.90 m"},
  pitch_m:{min:0.05,max:2.0,hint:"Typically 0.5×D to 1.5×D"},
  length_m:{min:0.5,max:100,hint:"Max span between bearings: ~3–4 m recommended"},
  capacity_t_h:{min:0.01,max:5000,hint:""},
  bearing_load_kN:{min:0.1,max:500,hint:""},
  shaft_allow_shear_mpa:{min:10,max:160,hint:"S355/GR50 allowable: ~80–120 MPa"},
  flight_thickness_m:{min:0.002,max:0.05,hint:"Typical: 5–12 mm depending on abrasion"},
  pipe_od_mm:{min:30,max:400,hint:"Pipe outer diameter"},
  pipe_wall_mm:{min:3,max:40,hint:"Pipe wall thickness"},
};
function validateField(k,v){
  const lim=FIELD_LIMITS[k];
  if(!lim) return null;
  if(v<lim.min) return `Min ${lim.min}${lim.hint?` — ${lim.hint}`:""}`;
  if(v>lim.max) return `Max ${lim.max}${lim.hint?` — ${lim.hint}`:""}`;
  return null;
}

/* ═══════════════════════════════════════════════════════════════════════════  MATERIAL RECOMMENDATIONS  ═══ */
function getMaterialRecs(mat){
  const w=mat.wear_coeff||1, abr=mat.abrasive||"Low", rho=mat.bulk_density||1;
  const moist=mat.moisture_pct||0;
  const recs={trough:[],flight:[],shaft:[],treatments:[],notes:[]};

  // Trough
  if(abr==="Very High"||w>=4){
    recs.trough.push("Hardox 450 or Creusabro 4800 (≥12 mm)");
    recs.trough.push("Full ceramic tile lining (Al₂O₃ 92%) for wet abrasives");
  } else if(abr==="High"||w>=2){
    recs.trough.push("Hardox 400 / AR400 wear-resistant plate (8–10 mm)");
    recs.trough.push("Replaceable wear liners on lower section");
  } else if(abr==="Medium"){
    recs.trough.push("Carbon steel S355 / ASTM A572 (6–8 mm)");
    if(moist>15) recs.trough.push("Consider 304L stainless or epoxy lining for moisture");
  } else {
    recs.trough.push(moist>5?"Stainless 304L (3 mm) — food/hygiene grade":"Carbon steel S235 (4–6 mm)");
  }
  if(rho>2.0) recs.trough.push("Increase trough gauge by 2 mm for high-density material loading");

  // Flight
  if(abr==="Very High"||w>=4){
    recs.flight.push("Chromium carbide overlay (CCO) plate — 6+6 mm");
    recs.flight.push("Tungsten carbide hard-facing weld on outer 30% of flight");
  } else if(abr==="High"||w>=2){
    recs.flight.push("Hardox 400 flights — 8–10 mm thick");
    recs.flight.push("Hard-band outer flight edge with Stoody or Lincoln ChromeCarbide");
  } else if(abr==="Medium"){
    recs.flight.push("Carbon steel S355 — 6–8 mm; consider EN14700-T Fe16 hard-facing");
    recs.flight.push("Flame hardening of flight OD to 50–55 HRC");
  } else {
    recs.flight.push("Carbon steel S235 or 304L stainless (food grade)");
  }

  // Shaft
  if(w>=3||abr==="High"||abr==="Very High"){
    recs.shaft.push("Solid bar EN10083 42CrMo4 (quench & temper)");
    recs.shaft.push("Or: Schedule 80 pipe for lighter weight at same section modulus");
    recs.shaft.push("Hard-chrome plating at seal locations");
  } else {
    recs.shaft.push("Solid bar S355 / AISI 1045 for standard duty");
    recs.shaft.push("Pipe shaft (EN10210 S355J2H) viable for light-medium duty — reduces inertia");
  }

  // Surface treatments
  if(abr==="High"||abr==="Very High"){
    recs.treatments.push("Hard-banding: submerged arc weld Stellite 6 or Chromocarbide on flight OD");
    recs.treatments.push("Thermal spray HVOF WC-Co coating on shaft bearing journals");
    if(w>=3.5) recs.treatments.push("Ceramic tile (SiC or B₄C) on impact zones at inlet chute");
  }
  if(abr==="Medium"||w>=1.5){
    recs.treatments.push("Flame hardening of trough lower section — target 48–52 HRC");
    recs.treatments.push("Induction hardening of flight edges for cost-effective life extension");
  }
  if(moist>20){
    recs.treatments.push("Hot-dip galvanize trough or 2-pack epoxy primer + polyurethane topcoat");
  }
  if(moist<2&&abr==="Low"){
    recs.treatments.push("Powder coat trough interior for corrosion protection (no abrasion budget needed)");
  }

  // Notes
  if(rho>1.8) recs.notes.push(`High bulk density (${rho} t/m³) — verify trough loading fraction and hanger bearing spacing`);
  if(mat.particle_size_mm>20) recs.notes.push(`Coarse particles (${mat.particle_size_mm} mm) — consider half-pitch inlet section and bolt-on wear shoes`);
  if(moist>30) recs.notes.push("Very high moisture — risk of build-up; evaluate paddle flights or ribbon flights with scrapers");

  return recs;
}

/* ═══════════════════════════════════════════════════════════════════════════  CALCS  ═══ */
function nextMotor(kW){for(const s of MOTOR_SIZES)if(s>=kW)return s;return MOTOR_SIZES[MOTOR_SIZES.length-1];}

function shaftTorsionalStrength(D_m, shaft_type, pipe_od_mm, pipe_wall_mm){
  // Returns {Wt_m3, d_eff_m} — torsional section modulus
  if(shaft_type==="pipe"&&pipe_od_mm>0&&pipe_wall_mm>0){
    const ro=pipe_od_mm/2000, ri=(pipe_od_mm/2-pipe_wall_mm)/1000;
    const Wt=Math.PI*(Math.pow(ro,3)-Math.pow(ri,3))*2/Math.max(ro,0.001);
    return{Wt_m3:Wt, d_eff_m:pipe_od_mm/1000, is_pipe:true, od_mm:pipe_od_mm, wall_mm:pipe_wall_mm, id_mm:pipe_od_mm-2*pipe_wall_mm};
  }
  const d=D_m*0.20;
  return{Wt_m3:Math.PI*Math.pow(d,3)/16, d_eff_m:d, is_pipe:false, od_mm:d*1000, wall_mm:null, id_mm:0};
}

function calcCEMA(inp){
  const mat=inp.material_data, D=inp.trough_diameter_m||inp.diameter_m, L=inp.length_m, N=inp.speed_rpm;
  const ang=inp.angle_deg*Math.PI/180;
  const Qv=(Math.PI/4)*D*D*D*N*mat.trough_loading*60, Qt=Qv*mat.bulk_density;
  const P_empty=0.06*N*Math.sqrt(D)*L/1000;
  const P_mat=inp.capacity_t_h*L*mat.lambda_cema*mat.Ks/367;
  const P_inc=inp.capacity_t_h*L*Math.sin(ang)*9.81/3600;
  const P_shaft=(P_empty+P_mat+P_inc)*inp.surge_factor;
  const P_total=P_shaft/0.90;
  const T_run=P_shaft*1000/(2*Math.PI*N/60), T_start=T_run*2.5;
  // Shaft — solid bar default 20% of trough dia; pipe if selected
  const shaftInfo=shaftTorsionalStrength(D, inp.shaft_type||"bar", inp.pipe_od_mm||80, inp.pipe_wall_mm||8);
  const tau=T_run/Math.max(shaftInfo.Wt_m3,1e-12)/1e6;
  const brg=inp.bearing_data;
  const L10=Math.pow(brg.C_kN/inp.bearing_load_kN,brg.p)*1e6/(60*N);
  const thick_usable=inp.flight_thickness_m-inp.wear_allowance_m;
  const wear_life=thick_usable/(mat.wear_coeff*1e-6*Qt+1e-9);
  const gbx=inp.gearbox_data;
  const is_ss=mat.abrasive==="Low"&&(mat.temperature_c||20)<80;
  const steel_type=is_ss?"Stainless 304":mat.wear_coeff>2?"WearLiner":"Steel";
  const unit_cost=COSTS_DB.find(c=>c.item===steel_type)?.usd_per_kg??2;
  const mass=(Math.PI/4*D*D*0.02+Math.PI*D*inp.flight_thickness_m*0.9)*L*7850;
  // Efficiency
  const max_cap_t_h=Qt;
  const cap_efficiency=Math.min(100,inp.capacity_t_h/Math.max(max_cap_t_h,0.001)*100);
  const kWh_per_tonne=max_cap_t_h>0?P_total/Math.max(max_cap_t_h,0.001):0;
  const fill_pct=mat.trough_loading*100;
  const design_efficiency=Math.max(0,Math.min(100,fill_pct*(1-Math.abs(ang)*180/Math.PI/90)*0.9));
  const warnings=[];
  if(tau>inp.shaft_allow_shear_mpa) warnings.push(`Shaft shear ${tau.toFixed(1)} MPa > allowable ${inp.shaft_allow_shear_mpa} MPa`);
  if(L10<20000) warnings.push(`Bearing L10 ${L10.toFixed(0)} h below 20,000 h target`);
  if(T_start>gbx.max_torque_Nm) warnings.push(`Startup torque ${T_start.toFixed(0)} Nm > gearbox limit ${gbx.max_torque_Nm.toLocaleString()} Nm`);
  if(Qt<inp.capacity_t_h) warnings.push(`Max capacity ${Qt.toFixed(1)} t/h < required ${inp.capacity_t_h} t/h`);
  if(inp.angle_deg>20) warnings.push(`Angle ${inp.angle_deg}° > 20° — CEMA capacity factor <0.75; consider twin-screw arrangement`);
  if(shaftInfo.is_pipe&&shaftInfo.id_mm<20) warnings.push("Pipe shaft ID too small — increase wall thickness or use solid bar");
  return {
    capacity:{achieved_t_h:Qt,required_t_h:inp.capacity_t_h,volumetric_m3h:Qv,fill_fraction:mat.trough_loading*Math.cos(ang),capacity_ok:Qt>=inp.capacity_t_h},
    power:{P_empty_kW:P_empty,P_material_kW:P_mat,P_incline_kW:P_inc,P_total_kW:P_total,motor_selected_kW:nextMotor(P_total)},
    torque:{running_Nm:T_run,startup_Nm:T_start,shaft_od_mm:shaftInfo.od_mm,shaft_id_mm:shaftInfo.id_mm,is_pipe:shaftInfo.is_pipe,actual_shear_mpa:tau,shear_ok:tau<=inp.shaft_allow_shear_mpa},
    bearing:{bearing_type:brg.name,C_kN:brg.C_kN,P_applied_kN:inp.bearing_load_kN,L10_hours:L10,L10_ok:L10>=20000},
    wear:{wear_coefficient:mat.wear_coeff,usable_thickness_m:thick_usable,estimated_life_hours:wear_life},
    gearbox:{model:gbx.model,max_torque_Nm:gbx.max_torque_Nm,required_power_kW:P_total,torque_ok:T_start<=gbx.max_torque_Nm,thermal_ok:P_total<=gbx.thermal_power_kW*gbx.thermal_sf},
    cost:{material_type:steel_type,unit_cost_usd_kg:unit_cost,steel_weight_kg:mass,estimated_cost_usd:mass*unit_cost},
    efficiency:{cap_util_pct:cap_efficiency,kWh_per_tonne:kWh_per_tonne,design_efficiency_pct:design_efficiency,fill_fraction_pct:fill_pct},
    matRecs:getMaterialRecs(mat),
    warnings
  };
}

function calcMixer(inp){
  const D=inp.diameter_m,L=inp.length_m,N=Number(inp.speed_rpm),rho=inp.bulk_density_t_m3*1000;
  const n_shafts=Number(inp.n_shafts)||1;
  const tip=Math.PI*D*N/60,Fr=Math.pow(N/60,2)*D/(2*9.81);
  const Qv=(Math.PI/4)*D*D*inp.pitch_ratio*D*N*inp.fill_fraction*60;
  const res_s=(Math.PI/4)*D*D*L*inp.fill_fraction/Math.max(Qv/3600,1e-9);
  const k_map={ribbon:0.015,paddle:0.025,combination:0.020};
  const k=(k_map[inp.flight_type]||0.015)*n_shafts;
  const MI=1-Math.exp(-k*N*res_s/60);
  const Ne_map={ribbon:2.5,paddle:4.0,combination:3.5};
  const Ne=Ne_map[inp.flight_type]||2.5;
  const P_mix=Ne*rho*Math.pow(N/60,3)*Math.pow(D,5)/1000*Math.pow(inp.fill_fraction/0.4,0.6);
  const P_tot=P_mix*1.15;
  const warnings=[];
  if(MI<inp.mixing_index_target) warnings.push(`Mixing index ${(MI*100).toFixed(1)}% < target — increase length or speed`);
  if(tip>3) warnings.push(`Tip speed ${tip.toFixed(2)} m/s > 3 m/s — risk of degradation`);
  return{type:"mixer",mixing_index:MI,mixing_ok:MI>=inp.mixing_index_target,froude_number:Fr,tip_speed_m_s:tip,residence_time_s:res_s,P_mixing_kW:P_mix,P_total_kW:P_tot,motor_kW:nextMotor(P_tot),volume_m3:(Math.PI/4)*D*D*L*inp.fill_fraction,batch_mass_kg:(Math.PI/4)*D*D*L*inp.fill_fraction*rho,n_paddle_rows:Math.max(3,Math.floor(L/(D*0.5))),warnings};
}
function calcDryer(inp){
  const T_avg=(inp.inlet_temp_c+inp.trough_temp_c)/2,lw=(2501-2.42*T_avg)*1000;
  const Fin=inp.feed_rate_t_h*1000,Mdry=Fin*(1-inp.moisture_in_pct/100);
  const denom=Math.max(1-inp.moisture_out_pct/100,0.001);
  const Wout=Mdry*(inp.moisture_out_pct/100)/denom;
  const Wevap=Math.max(0,Fin*(inp.moisture_in_pct/100)-Wout);
  const Qevap=Wevap*lw/3.6e6,Qsens=Fin*1800*Math.max(0,inp.target_temp_c-inp.inlet_temp_c)/3.6e6;
  const Qloss=(Qevap+Qsens)*0.15,Qtot=Qevap+Qsens+Qloss;
  const dT1=inp.trough_temp_c-inp.target_temp_c,dT2=inp.trough_temp_c-inp.inlet_temp_c;
  const LMTD=Math.abs(dT1-dT2)<0.01?Math.abs(dT1):(dT1-dT2)/Math.log(Math.max(Math.abs(dT1/Math.max(dT2,0.001)),1e-9));
  const Aq=Math.PI*inp.diameter_m*0.75*inp.length_m,Areq=(Qtot*1000)/Math.max(inp.U_W_m2K*Math.abs(LMTD),0.001);
  const warnings=[];
  if(Aq<Areq) warnings.push(`HX area ${Aq.toFixed(1)} m² < required ${Areq.toFixed(1)} m²`);
  return{type:"dryer",water_removed_kg_h:Wevap,Q_evap_kW:Qevap,Q_sensible_kW:Qsens,Q_losses_kW:Qloss,Q_total_kW:Qtot,heat_transfer_area_m2:Aq,required_length_m:Areq/Math.max(Math.PI*inp.diameter_m*0.75,0.001),length_ok:Aq>=Areq,steam_consumption_kg_h:(Qtot*3.6e6)/Math.max(lw,1),steam_temp_c:100+(inp.steam_pressure_bar-1)*28,NTU:inp.U_W_m2K*Aq/Math.max(Fin*1800/3600,0.001),evaporation_rate_kg_m2h:Wevap/Math.max(Aq,0.01),motor_kW:nextMotor(0.5),warnings};
}
function calcCooler(inp){
  const Fin=inp.feed_rate_t_h*1000,Qd=Fin*inp.Cp_material_J_kgK*Math.max(0,inp.inlet_temp_c-inp.target_temp_c)/3.6e6;
  const Qn=Qd*0.9,dTc=Math.max(1,inp.coolant_outlet_temp_c-inp.coolant_inlet_temp_c);
  const cf=Qn*3.6e6/(4186*dTc);
  const dT1=inp.inlet_temp_c-inp.coolant_outlet_temp_c,dT2=inp.target_temp_c-inp.coolant_inlet_temp_c;
  const LMTD=Math.abs(dT1-dT2)<0.01?Math.abs(dT1):(dT1-dT2)/Math.log(Math.max(Math.abs(dT1/Math.max(Math.abs(dT2),0.001)),1e-9));
  const Aa=Math.PI*inp.diameter_m*0.75*inp.length_m,Ar=(Qn*1000)/Math.max(inp.U_W_m2K*Math.abs(LMTD),0.001);
  const NTU=(inp.U_W_m2K*Aa)/Math.max(Fin*inp.Cp_material_J_kgK/3600,0.001);
  const warnings=[];
  if(Aa<Ar) warnings.push(`Required cooling length ${(Ar/(Math.PI*inp.diameter_m*0.75)).toFixed(1)} m > available`);
  if(inp.inlet_temp_c>300) warnings.push("T > 300°C — use high-temp seals and alloy construction");
  return{type:"cooler",Q_duty_kW:Qd,Q_losses_kW:Qd*0.1,coolant_flow_kg_h:cf,heat_transfer_area_m2:Aa,required_length_m:Ar/Math.max(Math.PI*inp.diameter_m*0.75,0.001),length_ok:Aa>=Ar,LMTD_K:LMTD,NTU:NTU,effectiveness:1-Math.exp(-NTU),motor_kW:nextMotor(0.5),warnings};
}
function calcSeparator(inp){
  const D=inp.diameter_m,L=inp.length_m,N=inp.speed_rpm,pa=(inp.pitch_inlet_m+inp.pitch_outlet_m)/2;
  const Qv=(Math.PI/4)*D*D*pa*N*inp.fill_fraction*60,res_s=(Math.PI/4)*D*D*L*inp.fill_fraction/Math.max(Qv/3600,1e-9);
  let sep=0.75,sharp=2.0,recs=[],warnings=[];
  if(inp.separation_type==="density"){const dr=Math.abs((inp.rho_B_t_m3||2.5)-(inp.rho_A_t_m3||1.6));sep=Math.min(0.95,0.3*Math.log1p(dr*res_s/100));sharp=dr*2;if(dr<0.3)warnings.push("Density diff low — poor separation");}
  else if(inp.separation_type==="particle_size"){const sigma=Math.max(inp.sigma_size||2,0.1),z=(inp.particle_size_mm-inp.cut_size_mm)/sigma;sep=1/(1+Math.exp(-1.5*z));sharp=4/sigma;recs.push(`Install ${inp.cut_size_mm} mm screen bars at discharge`);}
  else if(inp.separation_type==="magnetic"){sep=0.90;sharp=5.0;recs.push("Rare-earth drum magnets at discharge");}
  else{sep=0.75;sharp=2.5;recs.push("Size air velocity above terminal velocity of cut particle");}
  if(sep<0.70)warnings.push("Efficiency < 70% — multi-stage recommended");
  if(N>60){warnings.push("High RPM reduces stratification");recs.push("Reduce to 15–30 RPM");}
  const frac=Math.min(Math.max(inp.fraction_A_pct||60,0),100)/100;
  return{type:"separator",separation_efficiency:sep,separation_sharpness:sharp,underflow_t_h:inp.feed_rate_t_h*frac*sep,overflow_t_h:inp.feed_rate_t_h*(1-frac*sep),residence_time_s:res_s,motor_kW:nextMotor(0.5),recommendations:recs,warnings};
}
function calcReactor(inp){
  const D=inp.diameter_m,L=inp.length_m,N=inp.speed_rpm,Fin=inp.feed_rate_t_h*1000;
  const Qv=(Math.PI/4)*D*D*D*N*inp.fill_fraction*60,res_s=(Math.PI/4)*D*D*L*inp.fill_fraction/Math.max(Qv/3600,1e-9);
  const res_min=res_s/60,kr={thermal:0.005,chemical:0.02,biological:0.001,calcination:0.008}[inp.reaction_type]||0.005;
  const Da=kr*res_s,At=Math.PI*D*L*0.75,Qproc=Fin*inp.Cp_J_kgK*Math.max(0,inp.process_temp_c-inp.inlet_temp_c)/3.6e6;
  const warnings=[];
  if(res_min<inp.required_residence_min)warnings.push(`Actual ${res_min.toFixed(1)} min < required ${inp.required_residence_min} min`);
  if(inp.process_temp_c>250)warnings.push("T > 250°C — refractory lining required");
  return{type:"reactor",actual_residence_min:res_min,length_ok:res_min>=inp.required_residence_min,required_length_m:L*inp.required_residence_min*60/Math.max(res_s,0.001),Q_process_kW:Qproc,trough_area_m2:At,achievable_temp_rise_c:(inp.heat_flux_kW_m2*At*3.6e6)/Math.max(Fin*inp.Cp_J_kgK,1),conversion_pct:(1-Math.exp(-Da))*100,Damkohler_number:Da,motor_kW:nextMotor(0.5),warnings};
}
function calcCompactor(inp){
  const D=inp.diameter_m,dr=Math.max(0,inp.target_density_t_m3-inp.loose_density_t_m3);
  const bp_Pa=dr*1000*9.81*inp.length_m*0.4,tf=bp_Pa*(Math.PI/4)*D*D;
  const Qv=(Math.PI/4)*D*D*D*inp.speed_rpm*inp.fill_fraction*60,Pc=bp_Pa*Qv/3.6e6,Pt=Pc*1.3;
  const cr=inp.target_density_t_m3/Math.max(inp.loose_density_t_m3,0.01);
  const warnings=[];
  if(cr>2.5)warnings.push("High compression — risk of plugging");
  if(tf>50000)warnings.push(`Tip force ${tf.toFixed(0)} N — check shaft`);
  return{type:"compactor",compression_achieved:cr,back_pressure_kPa:bp_Pa/1000,tip_force_N:tf,P_compaction_kW:Pc,P_total_kW:Pt,motor_kW:nextMotor(Math.max(Pt,0.1)),warnings};
}

/* ═══ Efficiency Card ═══ */
function EfficiencyCard({eff}){

  const score=Math.round((eff.cap_util_pct/100*0.4+eff.design_efficiency_pct/100*0.4+(eff.kWh_per_tonne<2?1:eff.kWh_per_tonne<5?0.6:0.3)*0.2)*100);

}

function CalcPage({mats,brgs,gbxs}){
  const [std,setStd]=useState("CEMA");
  const [inp,sInp]=useState({
    material:"Cement",capacity_t_h:30,length_m:20,angle_deg:0,surge_factor:1.2,
    trough_diameter_m:0.3,pitch_m:0.3,speed_rpm:60,
    flight_thickness_m:0.008,wear_allowance_m:0.003,
    shaft_type:"bar",pipe_od_mm:80,pipe_wall_mm:8,
    bearing_type:"UC210",bearing_load_kN:10,
    gearbox_model:"GB-40k",shaft_allow_shear_mpa:40
  });
  const [R,sR]=useState(null);
  const [sw,sSw]=useState(null);
  const [swT,sSwT]=useState("speed");
  const [cmp,sCmp]=useState(null);
  const set=k=>v=>sInp(p=>({...p,[k]:v}));

  const baseInp=()=>({
    ...inp,
    diameter_m:inp.trough_diameter_m,
    material_data:mats.find(m=>m.name===inp.material)||mats[0],
    bearing_data:brgs.find(b=>b.name===inp.bearing_type)||brgs[2],
    gearbox_data:gbxs.find(g=>g.model===inp.gearbox_model)||gbxs[3],
  });
  const calc=()=>{try{sR(calcCEMA(baseInp()));}catch(e){console.error(e);}};
  const runSw=()=>{
    const b=baseInp();
    if(swT==="speed") sSw([10,20,30,40,50,60,80,100,120,150,200].map(N=>{const r=calcCEMA({...b,speed_rpm:N});return{x:N,cap:+r.capacity.achieved_t_h.toFixed(1),pwr:+r.power.P_total_kW.toFixed(2)};}));
    else if(swT==="diameter") sSw([0.1,0.15,0.2,0.25,0.3,0.35,0.4,0.45,0.5,0.6].map(D=>{const r=calcCEMA({...b,trough_diameter_m:D,diameter_m:D,pitch_m:D});return{x:D*1000,cap:+r.capacity.achieved_t_h.toFixed(1),pwr:+r.power.P_total_kW.toFixed(2)};}));
    else sSw([5,8,10,15,20,25,30,40,50].map(L=>{const r=calcCEMA({...b,length_m:L});return{x:L,pwr:+r.power.P_total_kW.toFixed(2),cost:+(r.cost.estimated_cost_usd/1000).toFixed(1),L10:+r.bearing.L10_hours.toFixed(0)};}));
  };
  const runCmp=()=>{
    const b=baseInp();const res={};
    [{s:"CEMA",f:1.00},{s:"KWS",f:1.03},{s:"DIN",f:1.01}].forEach(({s,f})=>{res[s]=calcCEMA({...b,material_data:{...b.material_data,lambda_cema:b.material_data.lambda_cema*f}});});
    sCmp(res);
  };

  return<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{display:"flex",background:"rgba(0,0,0,.3)",borderRadius:9,padding:3,gap:2}}>
        {["CEMA","KWS","DIN"].map(s=><button key={s} onClick={()=>{setStd(s);sR(null);}} style={{padding:"5px 18px",borderRadius:7,fontWeight:700,fontSize:12,border:"none",cursor:"pointer",background:std===s?C.accent:"transparent",color:std===s?C.bg:C.muted}}>{s==="CEMA"?"🇺🇸 ":s==="KWS"?"🏭 ":"🇩🇪 "}{s}</button>)}
      </div>
      <button onClick={runCmp} style={{background:C.hi,color:C.text,border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 14px",fontSize:11,fontWeight:600,cursor:"pointer"}}>⚖ Compare All 3</button>
    </div>

    {cmp&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,overflowX:"auto"}}>
      <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>Standards Comparison</p>
      <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
        <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{["Metric","CEMA","KWS","DIN"].map(h=><th key={h} style={{padding:"5px 10px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
        <tbody>{[["Capacity (t/h)",r=>r.capacity.achieved_t_h.toFixed(2)],["Power (kW)",r=>r.power.P_total_kW.toFixed(3)],["Motor (kW)",r=>r.power.motor_selected_kW],["Torque (Nm)",r=>r.torque.running_Nm.toFixed(0)],["L10 (h)",r=>r.bearing.L10_hours.toFixed(0)],["kWh/t",r=>r.efficiency.kWh_per_tonne.toFixed(3)],["Cost",r=>"$"+r.cost.estimated_cost_usd.toLocaleString(undefined,{maximumFractionDigits:0})]].map(([lb,fn])=><tr key={lb} style={{borderBottom:`1px solid rgba(28,48,72,.4)`}}><td style={{padding:"5px 10px",color:C.muted}}>{lb}</td>{["CEMA","KWS","DIN"].map(s=><td key={s} style={{padding:"5px 10px",fontFamily:"monospace",fontWeight:700,color:C.text}}>{cmp[s]?fn(cmp[s]):"—"}</td>)}</tr>)}</tbody>
      </table>
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"310px 1fr",gap:14}}>
      {/* ── Inputs ── */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {/* Material & Duty */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.accent,marginBottom:12}}>📦 Material &amp; Duty</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <F l="Material"><Si value={inp.material} onChange={set("material")} options={mats.map(m=>({v:m.name,l:m.name}))}/></F>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <F l="Capacity (t/h)"><VNi fkey="capacity_t_h" value={inp.capacity_t_h} onChange={set("capacity_t_h")} min={0.01}/></F>
              <F l="Length (m)"><VNi fkey="length_m" value={inp.length_m} onChange={set("length_m")} min={0.5}/></F>
              <F l="Angle (°)" hint="-20 to +45"><VNi fkey="angle_deg" value={inp.angle_deg} onChange={set("angle_deg")} min={-20} max={45}/></F>
              <F l="Surge Factor"><VNi fkey="surge_factor" value={inp.surge_factor} onChange={set("surge_factor")} min={1} max={2} step={0.05}/></F>
            </div>
          </div>
        </div>
        {/* Geometry */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.accent,marginBottom:12}}>⚙️ Geometry</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <F l="Trough Ø (m)" hint="ID"><VNi fkey="diameter_m" value={inp.trough_diameter_m} onChange={set("trough_diameter_m")} min={0.05} max={1.2} step={0.025}/></F>
            <F l="Pitch (m)"><VNi fkey="pitch_m" value={inp.pitch_m} onChange={set("pitch_m")} min={0.05} step={0.025}/></F>
            <F l="Speed (RPM)"><VNi fkey="speed_rpm" value={inp.speed_rpm} onChange={set("speed_rpm")} min={5} max={300}/></F>
            <F l="Flight Thick (m)"><VNi fkey="flight_thickness_m" value={inp.flight_thickness_m} onChange={set("flight_thickness_m")} min={0.002} max={0.05} step={0.001}/></F>
          </div>
        </div>
        {/* Shaft */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.accent,marginBottom:12}}>🔩 Shaft Configuration</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <F l="Shaft Type"><Si value={inp.shaft_type} onChange={set("shaft_type")} options={[{v:"bar",l:"Solid Bar (default 20% trough Ø)"},{v:"pipe",l:"Hollow Pipe (user-defined)"}]}/></F>
            {inp.shaft_type==="pipe"&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <F l="Pipe OD (mm)"><VNi fkey="pipe_od_mm" value={inp.pipe_od_mm} onChange={set("pipe_od_mm")} min={30} max={400}/></F>
                <F l="Wall Thick (mm)"><VNi fkey="pipe_wall_mm" value={inp.pipe_wall_mm} onChange={set("pipe_wall_mm")} min={3} max={40}/></F>
              </div>
              <div style={{background:"rgba(74,158,255,.06)",borderRadius:5,padding:"6px 10px",fontSize:10,color:"#93c5fd"}}>
                Pipe ID: {(inp.pipe_od_mm-2*inp.pipe_wall_mm).toFixed(0)} mm · Section modulus vs solid {((Math.pow(inp.pipe_od_mm/2000,3)-Math.pow((inp.pipe_od_mm/2-inp.pipe_wall_mm)/1000,3))/Math.pow(inp.trough_diameter_m*0.20/2,3)*100).toFixed(0)}%
              </div>
            </>}
            {inp.shaft_type==="bar"&&<div style={{background:"rgba(93,125,153,.07)",borderRadius:5,padding:"6px 10px",fontSize:10,color:C.muted}}>
              Solid bar OD = 20% × trough Ø = {(inp.trough_diameter_m*200).toFixed(0)} mm
            </div>}
          </div>
        </div>
        {/* Drive */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.accent,marginBottom:12}}>🔧 Drive &amp; Bearings</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <F l="Bearing Type"><Si value={inp.bearing_type} onChange={set("bearing_type")} options={brgs.map(b=>({v:b.name,l:b.name}))}/></F>
            <F l="Gearbox Model"><Si value={inp.gearbox_model} onChange={set("gearbox_model")} options={gbxs.map(g=>({v:g.model,l:g.model}))}/></F>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <F l="Bearing Load (kN)"><VNi fkey="bearing_load_kN" value={inp.bearing_load_kN} onChange={set("bearing_load_kN")} min={0.1}/></F>
              <F l="Allow. Shear (MPa)"><VNi fkey="shaft_allow_shear_mpa" value={inp.shaft_allow_shear_mpa} onChange={set("shaft_allow_shear_mpa")} min={10}/></F>
            </div>
          </div>
        </div>
        <button onClick={calc} style={{background:C.accent,color:C.bg,fontWeight:800,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,width:"100%"}}>▶ Calculate ({std})</button>
      </div>

      {/* ── Results ── */}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {R&&<>
          <Warn list={R.warnings}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <RC title="Capacity" icon="📊" accent>
              <RR label="Achieved" value={`${fmt(R.capacity.achieved_t_h)} t/h`} ok={R.capacity.capacity_ok} hl/>
              <RR label="Required" value={`${fmt(R.capacity.required_t_h)} t/h`}/>
              <RR label="Volumetric" value={`${fmt(R.capacity.volumetric_m3h)} m³/h`}/>
              <RR label="Fill Fraction" value={`${fmt(R.capacity.fill_fraction*100,1)} %`}/>
            </RC>
            <RC title="Power" icon="⚡" accent>
              <RR label="Empty Friction" value={`${fmt(R.power.P_empty_kW)} kW`}/>
              <RR label="Material" value={`${fmt(R.power.P_material_kW)} kW`}/>
              <RR label="Incline" value={`${fmt(R.power.P_incline_kW)} kW`}/>
              <RR label="Shaft Total" value={`${fmt(R.power.P_total_kW)} kW`} hl/>
              <RR label="Motor Selected" value={`${R.power.motor_selected_kW} kW`} hl/>
            </RC>
            <RC title="Torque &amp; Shaft" icon="🔄">
              <RR label="Running" value={`${fmt(R.torque.running_Nm,0)} Nm`}/>
              <RR label="Startup" value={`${fmt(R.torque.startup_Nm,0)} Nm`}/>
              <RR label={`Shaft ${R.torque.is_pipe?"(Pipe) OD":"(Bar) OD"}`} value={`${fmt(R.torque.shaft_od_mm,0)} mm`}/>
              {R.torque.is_pipe&&<RR label="Shaft ID" value={`${fmt(R.torque.shaft_id_mm,0)} mm`}/>}
              <RR label="Shear Stress" value={`${fmt(R.torque.actual_shear_mpa,2)} MPa`} ok={R.torque.shear_ok}/>
            </RC>
            <RC title="Bearing Life" icon="⭕">
              <RR label="Type" value={R.bearing.bearing_type}/>
              <RR label="C Dynamic" value={`${R.bearing.C_kN} kN`}/>
              <RR label="C/P Ratio" value={fmt(R.bearing.C_kN/R.bearing.P_applied_kN,2)}/>
              <RR label="L10 Life" value={`${fmtN(R.bearing.L10_hours)} h`} ok={R.bearing.L10_ok} hl/>
            </RC>
            <RC title="Wear Life" icon="🔧">
              <RR label="Wear Coeff" value={fmt(R.wear.wear_coefficient,1)}/>
              <RR label="Usable Thick" value={`${fmt(R.wear.usable_thickness_m*1000,1)} mm`}/>
              <RR label="Est. Life" value={`${fmtN(R.wear.estimated_life_hours)} h`} hl/>
            </RC>
            <RC title="Cost Estimate" icon="💰">
              <RR label="Steel Type" value={R.cost.material_type}/>
              <RR label="Unit Cost" value={`${fmt(R.cost.unit_cost_usd_kg,1)} USD/kg`}/>
              <RR label="Mass" value={`${fmtN(R.cost.steel_weight_kg)} kg`}/>
              <RR label="Est. Cost" value={`$${fmtN(R.cost.estimated_cost_usd)}`} hl/>
            </RC>
          </div>
          {/* Efficiency + Material Recs row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <EfficiencyCard eff={R.efficiency}/>
            <RC title="Gearbox Check" icon="⚙️">
              <RR label="Model" value={R.gearbox.model}/>
              <RR label="Startup Torque OK" value="" ok={R.gearbox.torque_ok}/>
              <RR label="Thermal Power OK" value="" ok={R.gearbox.thermal_ok}/>
            </RC>
          </div>
          <MatRecsCard recs={R.matRecs}/>
          <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
            <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>Power Breakdown</p>
            <ResponsiveContainer width="100%" height={140}>
              <BarChart data={[{n:"Empty Friction",kW:R.power.P_empty_kW},{n:"Material",kW:R.power.P_material_kW},{n:"Incline",kW:R.power.P_incline_kW}]} margin={{bottom:20}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                <XAxis dataKey="n" tick={{fill:C.muted,fontSize:9}} label={{value:"Component",position:"insideBottom",offset:-14,fill:C.muted,fontSize:9}}/>
                <YAxis tick={{fill:C.muted,fontSize:10}} label={{value:"kW",angle:-90,position:"insideLeft",fill:C.muted,fontSize:10}}/>
                <Tooltip contentStyle={{background:C.panel,border:`1px solid ${C.border}`,color:C.text}}/>
                <Bar dataKey="kW" fill={C.accent} radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>}

        {/* Sweep */}
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.muted,marginBottom:10}}>📉 Parametric Sweep</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{display:"flex",background:"rgba(0,0,0,.3)",borderRadius:7,padding:3,gap:2}}>
              {["speed","diameter","length"].map(t=><button key={t} onClick={()=>{sSwT(t);sSw(null);}} style={{padding:"4px 10px",borderRadius:5,fontSize:10,fontWeight:700,border:"none",cursor:"pointer",background:swT===t?C.hi:"transparent",color:swT===t?C.text:C.muted}}>{t==="speed"?"⚡ Speed":t==="diameter"?"⭕ Diam":"📏 Length"}</button>)}
            </div>
            <button onClick={runSw} style={{background:C.hi,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:10,fontWeight:600,cursor:"pointer"}}>▶ Run</button>
          </div>
          <SweepChart sw={sw} swT={swT}/>
        </div>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════  FAMILY PAGE  ═══ */
function FamilyPage({mats,brgs,gbxs}){
  const [cfg,sCfg]=useState({material:"Cement",angle_deg:0,surge_factor:1.2,diameters:[150,200,250,300,400,500],lengths:[5,10,15,20,25,30]});
  const [res,sRes]=useState(null);
  const [vt,sVt]=useState("matrix");
  const c=k=>v=>sCfg(p=>({...p,[k]:v}));
  const DA=[100,150,200,250,300,350,400,450,500,600,700,800];
  const LA=[3,5,8,10,12,15,18,20,25,30,35,40,45,50];
  const gen=()=>{
    const mat=mats.find(m=>m.name===cfg.material)||mats[0],brg=brgs[2],gbx=gbxs[3],pts=[];
    cfg.diameters.forEach(Dmm=>{cfg.lengths.forEach(L=>{
      const D=Dmm/1000,N=Math.round((50/D)*0.65);
      const r=calcCEMA({material_data:mat,bearing_data:brg,gearbox_data:gbx,trough_diameter_m:D,diameter_m:D,pitch_m:D,speed_rpm:N,length_m:L,capacity_t_h:9999,angle_deg:cfg.angle_deg,surge_factor:cfg.surge_factor,flight_thickness_m:0.006+D*0.025,wear_allowance_m:0.003,bearing_load_kN:mat.bulk_density*D*D*L*9.81/1000+1,shaft_allow_shear_mpa:40,shaft_type:"bar"});
      pts.push({diameter_mm:Dmm,length_m:L,speed_rpm:N,max_capacity_t_h:r.capacity.achieved_t_h,power_kW:r.power.P_total_kW,motor_kW:r.power.motor_selected_kW,torque_Nm:r.torque.running_Nm,L10_hours:r.bearing.L10_hours,cost_usd:r.cost.estimated_cost_usd,kWh_t:r.efficiency.kWh_per_tonne});
    });});
    sRes({points:pts});
  };
  const mtx=res?{}:null;
  if(res) res.points.forEach(p=>{const dk=`${p.diameter_mm}`,lk=`${p.length_m}`;if(!mtx[dk])mtx[dk]={};mtx[dk][lk]=p;});
  const byD=res?res.points.reduce((a,p)=>{const k=`${p.diameter_mm}mm`;if(!a[k])a[k]=[];a[k].push(p);return a;},{}):{};
  const CC=["#e8a000","#4a9eff","#1fb86e","#e05252","#8b5cf6","#06b6d4"];

  const TH=({children})=><th style={{padding:"9px 14px",textAlign:"left",color:"#93c5fd",fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",background:"rgba(0,0,0,.35)",whiteSpace:"nowrap",borderBottom:`2px solid ${C.border}`}}>{children}</th>;
  const TD=({children,hl,ok})=><td style={{padding:"8px 14px",fontFamily:"monospace",fontSize:13,color:ok===true?C.green:ok===false?C.red:hl?C.accent:C.text,fontWeight:hl?700:500,borderBottom:`1px solid rgba(28,48,72,.4)`}}>{children}</td>;

  return<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <p style={{fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.accent,marginBottom:14}}>⚙️ Family Configuration</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
        <F l="Material"><Si value={cfg.material} onChange={c("material")} options={mats.map(m=>({v:m.name,l:m.name}))}/></F>
        <F l="Angle (°)" hint="0–45"><Ni value={cfg.angle_deg} onChange={v=>c("angle_deg")(Math.min(45,Math.max(-20,v)))} min={-20} max={45}/></F>
        <F l="Surge Factor"><Ni value={cfg.surge_factor} onChange={c("surge_factor")} min={1} max={2} step={0.05}/></F>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:14}}>
        {[["Trough Diameter (mm)",DA,"diameters",C.accent,"rgba(232,160,0,.18)"],["Conveyor Length (m)",LA,"lengths",C.green,"rgba(31,184,110,.18)"]].map(([lbl,arr,key,col,bg])=>(
          <div key={key}>
            <p style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:7}}>{lbl}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {arr.map(v=><button key={v} onClick={()=>c(key)(cfg[key].includes(v)?cfg[key].filter(x=>x!==v):[...cfg[key],v].sort((a,b)=>a-b))}
                style={{padding:"4px 11px",borderRadius:5,fontSize:12,fontWeight:700,border:`1px solid ${cfg[key].includes(v)?col:C.border}`,background:cfg[key].includes(v)?bg:C.panel,color:cfg[key].includes(v)?col:C.muted,cursor:"pointer",fontFamily:"monospace",transition:"all .1s"}}>
                {v}
              </button>)}
            </div>
          </div>
        ))}
      </div>
      <button onClick={gen} style={{background:C.accent,color:C.bg,fontWeight:800,padding:"9px 24px",borderRadius:7,border:"none",cursor:"pointer",fontSize:13}}>▶ Generate Family</button>
    </div>

    {res&&<>
      <div style={{display:"flex",background:"rgba(0,0,0,.3)",borderRadius:9,padding:3,gap:2,width:"fit-content"}}>
        {[["matrix","📊 Capacity"],["power","⚡ Power"],["curves","📈 Curves"],["cost","💰 Cost"],["energy","🔋 Energy"]].map(([id,lb])=><button key={id} onClick={()=>sVt(id)} style={{padding:"6px 16px",borderRadius:7,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:vt===id?C.hi:"transparent",color:vt===id?C.text:C.muted}}>{lb}</button>)}
      </div>

      {(vt==="matrix"||vt==="power"||vt==="cost"||vt==="energy")&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:16,overflowX:"auto"}}>
        <p style={{fontSize:13,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"#93c5fd",marginBottom:4}}>
          {vt==="matrix"?"Maximum Capacity":vt==="power"?"Required Drive Power":vt==="cost"?"Estimated Construction Cost":"Energy Intensity"}
        </p>
        <p style={{fontSize:11,color:C.muted,marginBottom:12}}>
          {vt==="matrix"?"t/h — at CEMA design speed (65% of peripheral limit)":vt==="power"?"kW — total shaft power including surge factor":vt==="cost"?"USD — structural steel cost estimate only":"kWh per tonne conveyed — lower is more efficient"} · Material: <strong style={{color:C.accent}}>{cfg.material}</strong>
        </p>
        <table style={{width:"100%",fontSize:13,borderCollapse:"collapse",fontFamily:"monospace"}}>
          <thead><tr>
            <TH>Trough Ø (mm) \ Length (m) →</TH>
            {cfg.lengths.map(l=><TH key={l}>{l} m</TH>)}
          </tr></thead>
          <tbody>{cfg.diameters.map(d=><tr key={d}>
            <td style={{padding:"8px 14px",fontWeight:800,color:C.accent,fontSize:14,borderBottom:`1px solid rgba(28,48,72,.4)`,background:"rgba(0,0,0,.15)"}}>{d} mm</td>
            {cfg.lengths.map(l=>{
              const cell=mtx[`${d}`]?.[`${l}`];
              const v=vt==="matrix"?cell?.max_capacity_t_h:vt==="power"?cell?.power_kW:vt==="cost"?cell?.cost_usd:cell?.kWh_t;
              const disp=v!=null?(vt==="cost"?"$"+Math.round(v).toLocaleString():v.toFixed(vt==="matrix"?1:vt==="energy"?3:2)):"—";
              return<TD key={l} hl={vt==="matrix"}>{disp}</TD>;
            })}
          </tr>)}</tbody>
        </table>
      </div>}

      {vt==="curves"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {[["Capacity (t/h) vs Length","max_capacity_t_h","t/h"],["Power (kW) vs Length","power_kW","kW"]].map(([title,key,unit])=><div key={title} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
          <p style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3}}>{title}</p>
          <p style={{fontSize:10,color:C.muted,marginBottom:10}}>Each line = one trough diameter</p>
          <ResponsiveContainer width="100%" height={210}>
            <LineChart margin={{right:20,bottom:24,left:5}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="length_m" type="number" domain={["dataMin","dataMax"]} tick={{fill:C.muted,fontSize:10}} label={{value:"Conveyor Length (m)",position:"insideBottom",offset:-16,fill:C.muted,fontSize:10}}/>
              <YAxis tick={{fill:C.muted,fontSize:10}} label={{value:unit,angle:-90,position:"insideLeft",offset:8,fill:C.muted,fontSize:10}}/>
              <Tooltip contentStyle={{background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontSize:11}}/>
              <Legend wrapperStyle={{fontSize:11,color:C.text}}/>
              {Object.entries(byD).map(([dk,pts],i)=><Line key={dk} data={pts} dataKey={key} name={dk} stroke={CC[i%CC.length]} strokeWidth={2} dot={{r:3}} type="monotone"/>)}
            </LineChart>
          </ResponsiveContainer>
        </div>)}
      </div>}

      {/* Full table */}
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:16,overflowX:"auto"}}>
        <p style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>Full Design Point List</p>
        <p style={{fontSize:11,color:C.muted,marginBottom:12}}>{res.points.length} combinations · {cfg.material} · Angle {cfg.angle_deg}°</p>
        <table style={{width:"100%",fontSize:12,borderCollapse:"collapse",fontFamily:"monospace"}}>
          <thead><tr>
            <TH>Trough Ø (mm)</TH><TH>Length (m)</TH><TH>Speed (RPM)</TH>
            <TH>Max Cap. (t/h)</TH><TH>Power (kW)</TH><TH>Motor (kW)</TH>
            <TH>Torque (Nm)</TH><TH>Bearing L10 (h)</TH><TH>kWh/t</TH><TH>Cost (USD)</TH>
          </tr></thead>
          <tbody>{res.points.map((p,i)=><tr key={i}>
            <TD hl>{p.diameter_mm}</TD>
            <TD>{p.length_m}</TD>
            <TD>{p.speed_rpm}</TD>
            <TD hl>{p.max_capacity_t_h.toFixed(1)}</TD>
            <TD>{p.power_kW.toFixed(2)}</TD>
            <TD>{p.motor_kW}</TD>
            <TD>{p.torque_Nm.toFixed(0)}</TD>
            <td style={{padding:"8px 14px",fontFamily:"monospace",fontSize:12,color:p.L10_hours>=20000?C.green:C.red,fontWeight:700,borderBottom:`1px solid rgba(28,48,72,.4)`}}>{p.L10_hours.toFixed(0)}</td>
            <TD>{p.kWh_t.toFixed(3)}</TD>
            <TD>${p.cost_usd.toLocaleString(undefined,{maximumFractionDigits:0})}</TD>
          </tr>)}</tbody>
        </table>
      </div>
    </>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════  DB PAGE  ═══ */
function DBPage({mats,setMats,costs,setCosts}){
  const [tab,sTab]=useState("materials");
  const [modal,sModal]=useState(null);
  const [form,sForm]=useState({});
  const [msg,sMsg]=useState(null);
  const [search,sSearch]=useState("");
  const fv=k=>val=>sForm(p=>({...p,[k]:val}));
  const DEF={name:"",bulk_density:1.0,lambda_cema:1.5,trough_loading:0.30,Ks:1.0,abrasive:"Low",wear_coeff:1.0,cema_class:"II",angle_of_repose:35,particle_size_mm:10,moisture_pct:0,temperature_c:20,notes:""};
  const saveMat=()=>{
    if(!form.name?.trim()){sMsg({ok:false,text:"Name required"});return;}
    if(modal==="create"){if(mats.find(m=>m.name===form.name)){sMsg({ok:false,text:"Name already exists"});return;}setMats(p=>[...p,{...form,custom:true}]);}
    else setMats(p=>p.map(m=>m.name===form.name?{...form,custom:true}:m));
    sMsg({ok:true,text:"Saved!"});
  };
  const delMat=name=>{if(!mats.find(m=>m.name===name)?.custom){alert("Cannot delete built-in materials");return;}if(!confirm(`Delete "${name}"?`))return;setMats(p=>p.filter(m=>m.name!==name));};
  const filtered=mats.filter(m=>m.name.toLowerCase().includes(search.toLowerCase()));
  const TH2=({children})=><th style={{padding:"8px 12px",textAlign:"left",color:"#93c5fd",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.07em",background:"rgba(0,0,0,.3)",borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap"}}>{children}</th>;
  return<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",background:"rgba(0,0,0,.3)",borderRadius:9,padding:3,gap:2,width:"fit-content"}}>
      {[["materials","🪨 Materials"],["bearings","⭕ Bearings"],["costs","💰 Costs"]].map(([id,lb])=><button key={id} onClick={()=>sTab(id)} style={{padding:"6px 16px",borderRadius:7,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:tab===id?C.hi:"transparent",color:tab===id?C.text:C.muted}}>{lb}</button>)}
    </div>
    {tab==="materials"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input value={search} onChange={e=>sSearch(e.target.value)} placeholder="🔍 Search materials…" style={{...inp_base,maxWidth:240,width:"auto"}}/>
        <button onClick={()=>{sForm({...DEF});sModal("create");sMsg(null);}} style={{background:C.accent,color:C.bg,fontWeight:700,padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12}}>+ Add Material</button>
        <span style={{fontSize:12,color:C.muted}}>{filtered.length} materials</span>
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,overflow:"auto"}}>
        <table style={{width:"100%",fontSize:12,borderCollapse:"collapse",fontFamily:"monospace"}}>
          <thead><tr><TH2>Name</TH2><TH2>ρ (t/m³)</TH2><TH2>λ CEMA</TH2><TH2>Fill</TH2><TH2>Abrasive</TH2><TH2>Class</TH2><TH2>Moisture %</TH2><TH2>Notes</TH2><TH2></TH2></tr></thead>
          <tbody>{filtered.map(m=><tr key={m.name} style={{borderBottom:`1px solid rgba(28,48,72,.4)`,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(28,48,72,.3)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <td style={{padding:"7px 12px",fontWeight:700,color:m.custom?C.accent:C.text,fontSize:12}}>{m.name}{m.custom?" ★":""}</td>
            <td style={{padding:"7px 12px",fontSize:12}}>{m.bulk_density}</td>
            <td style={{padding:"7px 12px",fontSize:12}}>{m.lambda_cema}</td>
            <td style={{padding:"7px 12px",fontSize:12}}>{m.trough_loading}</td>
            <td style={{padding:"7px 12px"}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,background:m.abrasive==="High"?"rgba(224,82,82,.15)":m.abrasive==="Medium"?"rgba(217,142,0,.15)":"rgba(31,184,110,.15)",color:m.abrasive==="High"?C.red:m.abrasive==="Medium"?C.amber:C.green}}>{m.abrasive}</span></td>
            <td style={{padding:"7px 12px",fontSize:12}}>{m.cema_class}</td>
            <td style={{padding:"7px 12px",fontSize:12}}>{m.moisture_pct}%</td>
            <td style={{padding:"7px 12px",color:C.muted,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>{m.notes}</td>
            <td style={{padding:"7px 8px"}}><div style={{display:"flex",gap:4}}><button onClick={()=>{sForm({...m});sModal("edit");sMsg(null);}} style={{background:"rgba(74,158,255,.12)",color:C.blue,border:"1px solid rgba(74,158,255,.3)",borderRadius:4,padding:"3px 9px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Edit</button>{m.custom&&<button onClick={()=>delMat(m.name)} style={{background:"rgba(224,82,82,.1)",color:C.red,border:"1px solid rgba(224,82,82,.3)",borderRadius:4,padding:"3px 9px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Del</button>}</div></td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>}
    {tab==="bearings"&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,overflow:"auto"}}>
      <table style={{width:"100%",fontSize:12,borderCollapse:"collapse",fontFamily:"monospace"}}>
        <thead><tr><TH2>Designation</TH2><TH2>C Dynamic (kN)</TH2><TH2>Exponent p</TH2><TH2>Bore (mm)</TH2><TH2>Description</TH2></tr></thead>
        <tbody>{BEARINGS_DB.map(b=><tr key={b.name} style={{borderBottom:`1px solid rgba(28,48,72,.4)`}}>
          <td style={{padding:"7px 12px",fontWeight:700,color:C.accent,fontSize:12}}>{b.name}</td>
          <td style={{padding:"7px 12px",fontSize:12}}>{b.C_kN}</td>
          <td style={{padding:"7px 12px",fontSize:12}}>{b.p}</td>
          <td style={{padding:"7px 12px",fontSize:12}}>{b.bore_mm}</td>
          <td style={{padding:"7px 12px",color:C.muted,fontSize:12}}>{b.description}</td>
        </tr>)}</tbody>
      </table>
    </div>}
    {tab==="costs"&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <p style={{fontSize:13,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:C.accent,marginBottom:14}}>Material Cost Rates — edit inline (USD/kg)</p>
      <table style={{width:"100%",fontSize:12,borderCollapse:"collapse",fontFamily:"monospace"}}>
        <thead><tr><TH2>Material</TH2><TH2>USD / kg</TH2><TH2>Notes</TH2></tr></thead>
        <tbody>{costs.map((cost,i)=><tr key={cost.item} style={{borderBottom:`1px solid rgba(28,48,72,.3)`}}>
          <td style={{padding:"7px 12px",fontWeight:700,fontSize:12}}>{cost.item}</td>
          <td style={{padding:"7px 12px"}}><input type="number" defaultValue={cost.usd_per_kg} step={0.1} onChange={e=>setCosts(p=>p.map((x,j)=>j===i?{...x,usd_per_kg:parseFloat(e.target.value)||x.usd_per_kg}:x))} style={{...inp_base,width:90}}/></td>
          <td style={{padding:"7px 12px",color:C.muted,fontSize:11}}>{cost.notes}</td>
        </tr>)}</tbody>
      </table>
    </div>}
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,padding:24,width:600,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 50px rgba(0,0,0,.6)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{fontWeight:800,color:C.text,fontSize:16}}>{modal==="create"?"Add New Material":`Edit: ${form.name}`}</h3>
          <button onClick={()=>sModal(null)} style={{color:C.muted,fontSize:18,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[{k:"name",l:"Name",type:"text",dis:modal==="edit"},{k:"bulk_density",l:"Bulk Density (t/m³)",step:0.05},{k:"lambda_cema",l:"λ CEMA",step:0.05},{k:"trough_loading",l:"Trough Loading",step:0.05},{k:"Ks",l:"Ks (flight shape)",step:0.01},{k:"wear_coeff",l:"Wear Coefficient",step:0.1},{k:"angle_of_repose",l:"Angle of Repose (°)"},{k:"particle_size_mm",l:"Particle Size (mm)",step:0.1},{k:"moisture_pct",l:"Moisture (%)"},{k:"temperature_c",l:"Temperature (°C)"}].map(field=><div key={field.k}><label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted,display:"block",marginBottom:4}}>{field.l}</label>{field.type==="text"?<input value={form[field.k]||""} onChange={e=>fv(field.k)(e.target.value)} disabled={field.dis} style={inp_base} placeholder={`Enter ${field.l}…`}/>:<input type="number" value={form[field.k]||0} onChange={e=>fv(field.k)(parseFloat(e.target.value)||0)} step={field.step||"any"} style={inp_base}/>}</div>)}
          <div><label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted,display:"block",marginBottom:4}}>Abrasive</label><select value={form.abrasive||"Low"} onChange={e=>fv("abrasive")(e.target.value)} style={sel_s}>{["Low","Medium","High","Very High"].map(o=><option key={o}>{o}</option>)}</select></div>
          <div><label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted,display:"block",marginBottom:4}}>CEMA Class</label><select value={form.cema_class||"II"} onChange={e=>fv("cema_class")(e.target.value)} style={sel_s}>{["I","II","III","IV"].map(o=><option key={o}>{o}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:C.muted,display:"block",marginBottom:4}}>Notes</label><input value={form.notes||""} onChange={e=>fv("notes")(e.target.value)} style={inp_base} placeholder="Optional notes…"/></div>
        </div>
        {msg&&<div style={{marginTop:10,padding:"7px 10px",borderRadius:7,fontSize:12,background:msg.ok?"rgba(31,184,110,.1)":"rgba(224,82,82,.1)",color:msg.ok?C.green:C.red,border:`1px solid ${msg.ok?"rgba(31,184,110,.3)":"rgba(224,82,82,.3)"}`}}>{msg.ok?"✓":"✗"} {msg.text}</div>}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={saveMat} style={{background:C.accent,color:C.bg,fontWeight:800,flex:1,padding:"9px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12}}>{modal==="create"?"+ Create":"✓ Save"}</button>
          <button onClick={()=>sModal(null)} style={{background:C.hi,color:C.text,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 16px",cursor:"pointer",fontSize:12}}>Cancel</button>
        </div>
      </div>
    </div>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════  ROOT  ═══ */
const NAV=[
  {g:"Design",items:[{id:"calc",icon:"📐",l:"Calculator",s:"CEMA · KWS · DIN"},{id:"family",icon:"📋",l:"Family Designer",s:"D × L matrix"}]},
  {g:"Process",items:[{id:"proc",icon:"⚗️",l:"Process Modules",s:"Mix · Dry · Cool · Sep"}]},
  {g:"Data",items:[{id:"db",icon:"🗄️",l:"Database Manager",s:"Materials · Costs · CRUD"}]},
];
function App(){
  const [page,sPage]=useState("calc");
  const [sb,sSb]=useState(true);
  const [mats,setMats]=useState(MATERIALS_DB.map(m=>({...m})));
  const [costs,setCosts]=useState(COSTS_DB.map(c=>({...c})));
  const cur=NAV.flatMap(g=>g.items).find(i=>i.id===page);
  return<div style={{display:"flex",height:"100vh",background:C.bg,color:C.text,fontFamily:"system-ui,sans-serif",overflow:"hidden"}}>
    <aside style={{width:sb?228:50,flexShrink:0,background:"#081321",borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width .18s",overflow:"hidden"}}>
      <div style={{padding:"13px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8,minHeight:52}}>
        <span style={{fontSize:20,flexShrink:0}}>🔩</span>
        {sb&&<div style={{minWidth:0}}><p style={{fontWeight:800,fontSize:12,lineHeight:1.2,whiteSpace:"nowrap"}}>Screw Conveyor</p><p style={{fontSize:9,color:C.accent,fontWeight:700,letterSpacing:"0.1em",whiteSpace:"nowrap"}}>DESIGNER v2.0</p></div>}
        <button onClick={()=>sSb(p=>!p)} style={{marginLeft:"auto",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11,flexShrink:0,padding:2}}>{sb?"◀":"▶"}</button>
      </div>
      <nav style={{flex:1,overflowY:"auto",padding:"10px 0"}}>
        {NAV.map(g=><div key={g.g} style={{marginBottom:10}}>
          {sb&&<p style={{fontSize:8,fontWeight:800,letterSpacing:"0.2em",textTransform:"uppercase",color:"rgba(93,125,153,.4)",padding:"0 12px",marginBottom:2}}>{g.g}</p>}
          {g.items.map(item=><button key={item.id} onClick={()=>sPage(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:sb?"9px 12px":"9px 0",justifyContent:sb?"flex-start":"center",background:page===item.id?"rgba(232,160,0,.1)":"transparent",borderLeft:page===item.id?`3px solid ${C.accent}`:"3px solid transparent",border:"none",cursor:"pointer",transition:"all .1s",textAlign:"left"}}>
            <span style={{fontSize:15,flexShrink:0}}>{item.icon}</span>
            {sb&&<div style={{minWidth:0}}><p style={{fontSize:12,fontWeight:700,color:page===item.id?C.text:C.muted,lineHeight:1.2,whiteSpace:"nowrap"}}>{item.l}</p><p style={{fontSize:9,color:page===item.id?C.accent:"rgba(93,125,153,.5)",lineHeight:1.2,whiteSpace:"nowrap"}}>{item.s}</p></div>}
          </button>)}
        </div>)}
      </nav>
      <div style={{padding:"10px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:"50%",background:C.green,flexShrink:0}}/>{sb&&<span style={{fontSize:9,color:C.muted,whiteSpace:"nowrap"}}>All systems online</span>}</div>
    </aside>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{background:"#081321",borderBottom:`1px solid ${C.border}`,padding:"8px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0,minHeight:46}}>
        <span style={{fontSize:15}}>{cur?.icon}</span>
        <div><h1 style={{fontWeight:800,fontSize:13,letterSpacing:"-0.01em",lineHeight:1.2}}>{cur?.l}</h1><p style={{fontSize:9,color:C.muted}}>{cur?.s}</p></div>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <span style={{fontSize:9,background:"rgba(232,160,0,.12)",color:C.accent,border:"1px solid rgba(232,160,0,.3)",borderRadius:5,padding:"2px 7px",fontWeight:700}}>{mats.length} Materials</span>
          <span style={{fontSize:9,background:"rgba(31,184,110,.08)",color:C.green,border:"1px solid rgba(31,184,110,.3)",borderRadius:5,padding:"2px 7px",fontWeight:700}}>Live Preview</span>
        </div>
      </header>
      <main style={{flex:1,overflowY:"auto",padding:18}}>
        {page==="calc"  &&<CalcPage   mats={mats} brgs={BEARINGS_DB} gbxs={GEARBOXES_DB}/>}
        {page==="family"&&<FamilyPage mats={mats} brgs={BEARINGS_DB} gbxs={GEARBOXES_DB}/>}
        {page==="proc"  &&<ProcPage/>}
        {page==="db"    &&<DBPage mats={mats} setMats={setMats} costs={costs} setCosts={setCosts}/>}
      </main>
    </div>
  </div>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
